<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-container">
        <div class="main-curve-background">
            <header class="top-bar">
                <div class="status-bar-mock">
                    <span>9:30</span>
                    <div class="status-icons">
                        <i class="fa-solid fa-signal"></i>
                        <i class="fa-solid fa-wifi"></i>
                        <i class="fa-solid fa-battery-full"></i>
                    </div>
                </div>
                <div class="action-icons">
                    <i class="fa-regular fa-circle-question"></i>
                    <i class="fa-solid fa-gear"></i>
                    <i class="fa-regular fa-user"></i>
                </div>
            </header>

            <main class="content">
                <h1 class="title">Bienvenidos<br>a<br>Smart-Hub</h1>

                <button class="btn-primary">ENTRAR</button>

                <p class="login-text">O inicie sesion con</p>

                <button class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                    Google
                </button>
            </main>
        </div>

        <footer class="legal-footer">
            <p>Términos y condiciones | Política de uso y privacidad |<br>Política de cookies | Aviso legal</p>
            <div class="home-indicator"></div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
